name: Build DIFC Firmware

on:
  workflow_dispatch:
    inputs:
      vehicle:
        description: 'Vehicle (plane/copter/rover)'
        default: 'plane'
        type: choice
        options:
          - plane
          - copter
          - rover
          - sub

jobs:
  build-difc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up build container
        run: docker pull ardupilot/ardupilot-dev-chibios:v0.1.3

      - name: Build DIFC firmware
        run: |
          git config --global --add safe.directory /workspace
          docker run --rm -e GITHUB_WORKSPACE=/workspace \
            -v $GITHUB_WORKSPACE:/workspace \
            ardupilot/ardupilot-dev-chibios:v0.1.3 \
            bash -c "cd /workspace && \
              ./waf configure --board DIFC && \
              ./waf ${{ inputs.vehicle }}"

      - name: Generate HEX file
        run: |
          python3 Tools/scripts/generate_nav_io.py build/DIFC/bin/*.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DIFC-${{ github.inputs.vehicle }}-firmware
          path: |
            build/DIFC/bin/*.bin
            build/DIFC/bin/*.hex
            build/DIFC/bin/*.apj
          retention-days: 5

      - name: List build outputs
        run: ls -la build/DIFC/bin/